services:
  db:
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hrms_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hrms_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./BACKEND
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/hrms_db
      DB_USERNAME: postgres
      DB_PASSWORD: postgres

  frontend:
    build:
      context: ./FRONTEND
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data: